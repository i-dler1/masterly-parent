services:
  postgres:
    image: postgres:15-alpine
    container_name: masterly-postgres
    environment:
      POSTGRES_DB: masterly_db
      POSTGRES_USER: masterly_user
      POSTGRES_PASSWORD: masterly_password
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masterly_user -d masterly_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:latest
    container_name: masterly-flyway
    volumes:
      - ./core-service/src/main/resources/db/migration:/flyway/sql
    command: -url=jdbc:postgresql://postgres:5432/masterly_db -user=masterly_user -password=masterly_password migrate
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: