<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет клиента</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav {
            background: #333;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .nav a {
            float: left;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        .nav a:hover {
            background-color: #ddd;
            color: black;
        }
        .content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logout-form {
            float: right;
            margin: 10px;
        }
        .logout-form button {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .badge {
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
        }
        .bg-success { background-color: #28a745; }
        .bg-danger { background-color: #dc3545; }
        .bg-warning { background-color: #ffc107; color: black; }
        .bg-secondary { background-color: #6c757d; }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly</h1>
    <p>Личный кабинет клиента</p>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/">Главная</a>
    <a href="/client/profile">Мой профиль</a>
</div>

<div class="content">
    <h2>Мои данные</h2>
    <div class="card mb-4">
        <div class="card-body">
            <p><strong>Имя:</strong> <span th:text="${client.fullName}"></span></p>
            <p><strong>Email:</strong> <span th:text="${client.email}"></span></p>
            <p><strong>Телефон:</strong> <span th:text="${client.phone}"></span></p>
        </div>
    </div>

    <h2>Мои записи</h2>
    <div th:if="${appointments == null or appointments.empty}" class="alert alert-info">
        У вас пока нет записей
    </div>
    <table class="table table-striped" th:unless="${appointments == null or appointments.empty}">
        <thead>
        <tr>
            <th>Дата</th>
            <th>Время</th>
            <th>Услуга</th>
            <th>Мастер</th>
            <th>Статус</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="app : ${appointments}">
            <td th:text="${app.appointmentDate}"></td>
            <td th:text="${app.startTime} + ' - ' + ${app.endTime}"></td>
            <td th:text="${app.serviceName}"></td>
            <td th:text="${app.masterId}"></td>
            <td>
    <span class="badge"
          th:class="${app.status == 'CONFIRMED' ? 'bg-success' :
                    (app.status == 'CANCELLED' ? 'bg-danger' :
                    (app.status == 'COMPLETED' ? 'bg-secondary' : 'bg-warning'))}"
          th:text="${app.status == 'PENDING' ? 'Ожидает подтверждения' :
                   (app.status == 'CONFIRMED' ? 'Подтверждена' :
                   (app.status == 'COMPLETED' ? 'Выполнена' :
                   (app.status == 'CANCELLED' ? 'Отменена' : app.status)))}">
    </span>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a href="/" class="btn btn-secondary">На главную</a>
    </div>
</div>
</body>
</html>
