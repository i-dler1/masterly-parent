<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Клиенты - Masterly</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .pagination { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .pagination a { padding: 8px 12px; text-decoration: none; color: #007bff; border: 1px solid #ddd; border-radius: 4px; }
        .pagination a:hover { background-color: #007bff; color: white; }
        .pagination .active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        .btn { display: inline-block; padding: 8px 16px; background-color: #28a745; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 20px; }
        .nav { background: #333; padding: 10px; margin-bottom: 20px; border-radius: 8px; }
        .nav a { color: white; padding: 10px 15px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .edit-btn { color: #007bff; text-decoration: none; margin-right: 10px; }
        .delete-btn { color: #dc3545; text-decoration: none; }
    </style>
</head>
<body>
<div class="nav">
    <a href="/clients">Клиенты</a>
    <a href="/services">Услуги</a>
    <a href="/materials">Материалы</a>
    <a href="/appointments">Записи</a>
    <a href="/profile">Профиль</a>
    <a href="/logout">Выйти</a>
</div>

<div class="container">
    <h1>Список клиентов</h1>
    <a href="/clients/new" class="btn">Добавить клиента</a>

    <table border="1">
    <table>
        <thead>
        <tr>
            <th>№</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Email</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="client, stat : ${clients}">
            <td th:text="${startIndex + stat.index}">1</td>
            <td th:text="${client.fullName}">Анна Смирнова</td>
            <td th:text="${client.phone}">+375291234567</td>
            <td th:text="${client.email}">anna@example.com</td>
            <td>
                <a th:href="@{/clients/edit/{id}(id=${client.id})}" class="edit-btn">Редактировать</a>
                <a th:href="@{/clients/delete/{id}(id=${client.id})}" class="delete-btn" onclick="return confirm('Удалить клиента?')">Удалить</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(clients)}">
            <td colspan="5" style="text-align: center;">Нет клиентов</td>
        </tr>
        </tbody>
    </table>

        <div class="pagination">
            <a th:if="${currentPage > 0}"
               th:href="@{/clients(page=${currentPage - 1}, size=${size})}">
                « Предыдущая
            </a>

            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
               th:class="${i == currentPage} ? 'active' : ''"
               th:href="@{/clients(page=${i}, size=${size})}"
               th:text="${i + 1}">1</a>

            <a th:if="${currentPage + 1 < totalPages}"
               th:href="@{/clients(page=${currentPage + 1}, size=${size})}">
                Следующая »
            </a>
        </div>

        <div style="margin-top: 20px;">
            <label>Показывать на странице:</label>
            <select onchange="window.location.href=this.value">
                <option th:selected="${size == 5}" th:value="@{/clients(page=0, size=5)}">5</option>
                <option th:selected="${size == 10}" th:value="@{/clients(page=0, size=10)}">10</option>
                <option th:selected="${size == 20}" th:value="@{/clients(page=0, size=20)}">20</option>
                <option th:selected="${size == 50}" th:value="@{/clients(page=0, size=50)}">50</option>
            </select>
        </div>

</div>
</body>
</html>
