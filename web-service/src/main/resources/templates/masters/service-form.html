<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Редактировать услугу' : 'Добавить услугу'">Услуга - Masterly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #333; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .nav a { float: left; color: white; text-align: center; padding: 14px 16px; text-decoration: none; }
        .nav a:hover { background-color: #ddd; color: black; }
        .content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-form button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-save { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background-color: #6c757d; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
<div class="header">
    <h1>Masterly</h1>
    <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit">Выйти</button>
    </form>
</div>

<div class="nav">
    <a href="/master/profile">Профиль</a>
    <a href="/master/services">Услуги</a>
    <a href="/master/materials">Материалы</a>
    <a href="/master/clients">Клиенты</a>
    <a href="/master/appointments">Записи</a>
    <a href="/master/slots">Слоты времени</a>
    <a href="/">Главная</a>
</div>

<div class="content">
    <h2 th:text="${isEdit} ? 'Редактировать услугу' : 'Добавить услугу'"></h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/master/services/save}" method="post">
        <input type="hidden" th:field="*{service.id}" />

        <div class="form-group">
            <label for="name">Название услуги *</label>
            <input type="text" id="name" th:field="*{service.name}" required />
        </div>

        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" th:field="*{service.description}" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="durationMinutes">Длительность (минуты) *</label>
            <input type="number" id="durationMinutes" th:field="*{service.durationMinutes}" required min="5" max="480" />
        </div>

        <div class="form-group">
            <label for="price">Цена (руб) *</label>
            <input type="number" id="price" th:field="*{service.price}" required min="0" step="0.01" />
        </div>

        <div class="form-group">
            <label for="category">Категория</label>
            <input type="text" id="category" th:field="*{service.category}" />
        </div>

        <div class="form-group">
            <label for="isActive">Активна</label>
            <select id="isActive" th:field="*{service.isActive}">
                <option th:value="true" th:selected="${service.isActive}">Да</option>
                <option th:value="false" th:selected="${!service.isActive}">Нет</option>
            </select>
        </div>

        <button type="submit" class="btn-save">Сохранить</button>
        <a href="/master/services" class="btn-cancel">Отмена</a>
    </form>
</div>
</body>
</html>
